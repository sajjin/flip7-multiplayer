version: "3.9"

services:
  flip7:
    build: .
    container_name: flip7
    ports:
      - "3000:4567"
    volumes:
      # Persist room state across container restarts
      - flip7-data:/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4567
      - DATA_FILE=/data/rooms.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4567/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  flip7-data:
    driver: local
